<div class="container">
  <div class="header">
    <h1>🍕 Order Now</h1>
  </div>

  <div class="form-section">
    <h2>Order Form</h2>
    
    <div class="form-group">
      <label for="pizzaName">Pizza Name:</label>
      <input type="text" id="pizzaName" [(ngModel)]="pizzaName" placeholder="Enter pizza name" class="form-input">
    </div>

    <div class="form-group">
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" [(ngModel)]="quantity" min="1" placeholder="1" class="form-input">
    </div>

    <div class="form-group">
      <label for="address">Delivery Address:</label>
      <input type="text" id="address" [(ngModel)]="address" placeholder="Enter your address" class="form-input">
    </div>
  </div>

  <div class="summary-section">
    <h2>Order Summary</h2>
    <div class="summary-card">
      <div class="summary-item">
        <span class="label">Pizza:</span>
        <span class="value">{{ pizzaName || 'Not selected' }}</span>
      </div>
      <div class="summary-item">
        <span class="label">Quantity:</span>
        <span class="value">{{ quantity }}</span>
      </div>
      <div class="summary-item">
        <span class="label">Address:</span>
        <span class="value">{{ address || 'Not entered' }}</span>
      </div>
    </div>
    <button class="btn-order" [disabled]="!isOrderValid()">Place Order</button>
  </div>
</div>
